[tool.mypy]
python_version = "3.11"
explicit_package_bases = true
mypy_path = "."

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.ruff]
line-length = 88
target-version = "py311"

[[tool.mypy.overrides]]
module = ["joblib", "pywt", "scipy.*", "sklearn.*", "prometheus_fastapi_instrumentator", "shap", "sqlalchemy", "sqlalchemy.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["numpy", "pandas"]
ignore_missing_imports = true
